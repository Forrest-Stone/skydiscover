# CostAda (BCHD) Phase-2 configuration

max_iterations: 100
checkpoint_interval: 10
log_level: "INFO"
random_seed: 42

llm:
  models:
    - name: "gpt-5"
      weight: 1.0
      input_price_per_1m: 0.72
      output_price_per_1m: 2.3
  guide_models:
    - name: "gpt-5-mini"
      weight: 1.0
      input_price_per_1m: 0.25
      output_price_per_1m: 1.0
  api_base: "https://api.openai.com/v1"
  temperature: 0.7
  max_tokens: 32000
  timeout: 600

search:
  type: "costada"
  num_context_programs: 4
  database:
    population_size: 20
    num_islands: 2
    use_dynamic_islands: true
    max_islands: 5
    spawn_productivity_threshold: 0.015
    spawn_cooldown_iterations: 30

    # Reuse AdaEvolve scaffold knobs
    decay: 0.9
    intensity_min: 0.15
    intensity_max: 0.5
    use_adaptive_search: true
    use_ucb_selection: true
    use_migration: true
    use_unified_archive: true
    migration_interval: 15
    migration_count: 5
    use_paradigm_breakthrough: true
    paradigm_window_size: 10
    paradigm_improvement_threshold: 0.12
    paradigm_max_uses: 2
    paradigm_num_to_generate: 3
    enable_error_retry: true
    max_error_retries: 2

    # Shared budget (phase-1)
    # You can override nominal budget per run, e.g. 0.5 or 1.2:
    #   nominal_budget: 0.5
    # or select a profile from configs/model_pricing.yaml:
    #   budget_profile: "budget_0_5"   # or "budget_1_2"
    nominal_budget: 1000000.0

    # BCHD/CostAda controller hyperparameters
    costada_alpha: 0.9
    costada_router_beta: 0.5
    costada_router_gamma: 0.9
    costada_tier_tau_1: 0.24
    costada_tier_tau_2: 0.38
    costada_eta_low: 0.12
    costada_rich_enable_min_budget: 0.28
    costada_eta_min: 0.15
    costada_meta_h_threshold: 0.01
    costada_meta_window: 8
    costada_improvement_window: 8
    costada_stagnation_steps: 8
    costada_significant_gain_eps: 1.0e-6

    # Tier settings
    cheap_max_output_tokens: 512
    standard_max_output_tokens: 1024
    rich_max_output_tokens: 2048
    costada_cheap_context_programs: 2
    costada_rich_context_programs: 6
    costada_cheap_feedback_chars: 300
    costada_standard_feedback_chars: 800
    costada_rich_feedback_chars: 1500

prompt:
  template: "costada"
  system_message: |
    <REPLACE WITH YOUR PROBLEM-SPECIFIC SYSTEM MESSAGE>

    Describe:
    - What the algorithm/function should do
    - Input/output format
    - Optimization objective and metrics
    - Constraints
    - Techniques to explore

evaluator:
  timeout: 360
  max_retries: 3
  cascade_evaluation: true
  cascade_thresholds: [0.3, 0.6]

diff_based_generation: true
max_solution_length: 60000
