model_pricing:
  # Edit prices in this single file to control cost accounting defaults.
  # Units: USD per 1M tokens.

  gpt-5:
    input_price_per_1m: 0.72
    output_price_per_1m: 2.30

  gpt-5-mini:
    input_price_per_1m: 0.25
    output_price_per_1m: 1.00

  # OpenRouter / Zhipu GLM-5 example (adjust to your real provider billing).
  z-ai/glm-5:
    input_price_per_1m: 0.50
    output_price_per_1m: 1.50

# Shared budget defaults (applied to all search types).
budget_defaults:
  nominal_budget: 1.0

# Fair-comparison reporting defaults. These are consumed by aggregation scripts,
# not by the search controllers.
budget_comparison:
  # Budget grid expressed as multiples of budget_defaults.nominal_budget.
  budget_multipliers: [0.25, 0.5, 1.0, 1.5, 2.0]

# Optional profile overlay for different regimes.
# Select by:
#   - search.database.budget_profile in task config, or
#   - SKYDISCOVER_BUDGET_PROFILE env var.
budget_profiles:
  low_budget:
    nominal_budget: 0.3
  budget_0_5:
    nominal_budget: 0.5
  budget_1_2:
    nominal_budget: 1.2
  high_budget:
    nominal_budget: 2.0

# CostAda-specific budget/control knobs.
costada_budget:
  nominal_budget: 1.0
  costada_ref_cost: 0.01

# AdaEvolve budget instrumentation only (no budget-constrained behavior):
# nominal_budget is the largest default comparison budget, used for reporting.
# Fair plots/metrics still compare truncated prefixes at 0.25x/0.5x/1.0x/1.5x/2.0x.
adaevolve_budget:
  nominal_budget: 2.0

# EvoX budget instrumentation only (no budget-constrained behavior):
# nominal_budget is the largest default comparison budget, used for reporting.
# Fair plots/metrics still compare truncated prefixes at 0.25x/0.5x/1.0x/1.5x/2.0x.
evox_budget:
  nominal_budget: 2.0
