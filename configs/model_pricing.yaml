model_pricing:
  # Edit prices in this single file to control cost accounting defaults.
  # Units: USD per 1M tokens.

  gpt-5:
    input_price_per_1m: 0.72
    output_price_per_1m: 2.30

  gpt-5-mini:
    input_price_per_1m: 0.25
    output_price_per_1m: 1.00

  # OpenRouter / Zhipu GLM-5 example (adjust to your real provider billing).
  z-ai/glm-5:
    input_price_per_1m: 0.50
    output_price_per_1m: 1.50

# Shared budget defaults (applied to all search types).
budget_defaults:
  nominal_budget: 1.0

# Optional profile overlay for different regimes.
# Select by:
#   - search.database.budget_profile in task config, or
#   - SKYDISCOVER_BUDGET_PROFILE env var.
budget_profiles:
  low_budget:
    nominal_budget: 0.3
  budget_0_5:
    nominal_budget: 0.5
  budget_1_2:
    nominal_budget: 1.2
  high_budget:
    nominal_budget: 2.0

# CostAda/BCHD-specific budget/control knobs.
costada_budget:
  nominal_budget: 1000000000.0

# AdaEvolve phase-1 budget instrumentation only (no budget-constrained behavior):
# use a very large nominal budget so original search logic is effectively unchanged.
adaevolve_budget:
  nominal_budget: 1000000000.0

# EvoX phase-1 budget instrumentation only (no budget-constrained behavior):
# use a very large nominal budget so original search logic is effectively unchanged.
evox_budget:
  nominal_budget: 1000000000.0
