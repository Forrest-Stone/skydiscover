model_pricing:
  # Edit prices in this single file to control cost accounting defaults.
  # Units: USD per 1M tokens.

  gpt-5:
    input_price_per_1m: 0.72
    output_price_per_1m: 2.30

  gpt-5-mini:
    input_price_per_1m: 0.25
    output_price_per_1m: 1.00

  # OpenRouter / Zhipu GLM-5 example (adjust to your real provider billing).
  z-ai/glm-5:
    input_price_per_1m: 0.50
    output_price_per_1m: 1.50

# Shared budget defaults (applied to all search types).
budget_defaults:
  nominal_budget: 1.0

# Optional profile overlay for different regimes.
# Select by:
#   - search.database.budget_profile in task config, or
#   - SKYDISCOVER_BUDGET_PROFILE env var.
budget_profiles:
  low_budget:
    nominal_budget: 0.3
  high_budget:
    nominal_budget: 2.0

# CostAda/BCHD-specific budget/control knobs.
costada_budget:
  cheap_max_output_tokens: 512
  standard_max_output_tokens: 1024
  rich_max_output_tokens: 2048
  costada_tier_tau_1: 0.24
  costada_tier_tau_2: 0.38
  costada_eta_low: 0.12
  costada_rich_enable_min_budget: 0.28
  costada_eta_min: 0.15
  costada_meta_h_threshold: 0.01
  costada_meta_window: 8
  costada_improvement_window: 8
  costada_stagnation_steps: 8
  costada_significant_gain_eps: 1.0e-6

# AdaEvolve phase-1 budget instrumentation only (no budget-constrained behavior):
# use a very large nominal budget so original search logic is effectively unchanged.
adaevolve_budget:
  nominal_budget: 1000000000.0

# BudgetAdaEvolve-specific budget knobs.
budget_adaevolve_budget:
  budget_enabled: true
  budget_strict_stop: true
  budget_accounting_mode: provider_usage
  token_budget_total: 500000
  cost_budget_total: 0.0
  budget_bins: [0.2, 0.5, 0.8]
  cheap_max_output_tokens: 512
  standard_max_output_tokens: 1024
  rich_max_output_tokens: 2048
  budget_lambda: 1.0e-4
  budget_ucb_beta: 0.5
  budget_meta_threshold: 0.25
  budget_significant_gain_eps: 1.0e-6

# BudgetEvolve-specific budget knobs (same defaults for now).
budgetevolve_budget:
  budget_enabled: true
  budget_strict_stop: true
  budget_accounting_mode: provider_usage
  token_budget_total: 500000
  cost_budget_total: 0.0
  budget_bins: [0.2, 0.5, 0.8]
  cheap_max_output_tokens: 512
  standard_max_output_tokens: 1024
  rich_max_output_tokens: 2048
  budget_lambda: 1.0e-4
  budget_ucb_beta: 0.5
  budget_meta_threshold: 0.25
  budget_significant_gain_eps: 1.0e-6

# EvoX phase-1 budget instrumentation only (no budget-constrained behavior):
# use a very large nominal budget so original search logic is effectively unchanged.
evox_budget:
  nominal_budget: 1000000000.0
