# BudgetEvolve configuration
# Independent budget-aware method built on AdaEvolve scaffold

max_iterations: 100
checkpoint_interval: 10
log_level: "INFO"
random_seed: 42

llm:
  models:
    - name: "gpt-5"
      weight: 1.0
      input_price_per_1m: 0.72
      output_price_per_1m: 2.3
  guide_models:
    - name: "gpt-5-mini"
      weight: 1.0
      input_price_per_1m: 0.25
      output_price_per_1m: 1.0
  api_base: "https://api.openai.com/v1"
  temperature: 0.7
  max_tokens: 32000
  timeout: 600

search:
  type: "budgetevolve"
  num_context_programs: 4
  database:
    # Shared AdaEvolve scaffold
    population_size: 20
    num_islands: 2
    decay: 0.9
    intensity_min: 0.15
    intensity_max: 0.5
    use_adaptive_search: true
    use_ucb_selection: true
    use_migration: true
    use_unified_archive: true
    migration_interval: 15
    migration_count: 5
    use_dynamic_islands: true
    max_islands: 5
    spawn_productivity_threshold: 0.015
    spawn_cooldown_iterations: 30
    use_paradigm_breakthrough: true
    paradigm_window_size: 10
    paradigm_improvement_threshold: 0.12
    paradigm_max_uses: 2
    paradigm_num_to_generate: 3
    enable_error_retry: true
    max_error_retries: 2

    # Shared phase-1 USD budget trace protocol
    nominal_budget: 1.0

    # BudgetEvolve token/cost controller knobs
    budget_enabled: true
    budget_strict_stop: true
    token_budget_total: 500000
    cost_budget_total: 1.0
    budget_bins: [0.2, 0.5, 0.8]
    budget_significant_gain_eps: 1.0e-6
    budget_lambda: 1.0e-4
    budget_ucb_beta: 0.5
    budget_meta_threshold: 0.25

    # Per-token cost for the method-local token ledger (USD/token)
    input_token_cost: 0.00000072
    output_token_cost: 0.00000230

    # Action tiers
    cheap_max_output_tokens: 512
    standard_max_output_tokens: 1024
    rich_max_output_tokens: 2048

prompt:
  template: "budgetevolve"
  system_message: |
    <REPLACE WITH YOUR PROBLEM-SPECIFIC SYSTEM MESSAGE>

    Optimize for evaluator score under budget-aware search control.

evaluator:
  timeout: 360
  max_retries: 3
  cascade_evaluation: true
  cascade_thresholds: [0.3, 0.6]

diff_based_generation: true
max_solution_length: 60000
